{{define "network/list.html"}}
{{range .Connections}}
<tr style="border-bottom:1px solid var(--border)">
  <td style="padding:6px 8px">{{.ProcName}}</td>
  <td style="padding:6px 8px;font-family:monospace;font-size:12px">{{.PID}}</td>
  <td style="padding:6px 8px;font-family:monospace;font-size:12px">{{.LocalAddr}}</td>
  <td style="padding:6px 8px;font-family:monospace;font-size:12px">{{.RemoteAddr}}</td>
  <td style="padding:6px 8px;font-size:12px">{{.Status}}</td>
  <td style="padding:6px 8px">
    <form hx-post="/tools/network/block" style="margin:0">
      <input type="hidden" name="ip" value="{{.RemoteAddr}}">
      <button class="fdev-btn fdev-btn--danger fdev-btn--sm"
        type="submit"
        hx-confirm="Bloquear conexão para {{.RemoteAddr}}? (requer sudo)"
        style="padding:2px 8px;font-size:11px">
        Block
      </button>
    </form>
  </td>
</tr>
{{end}}
{{if eq (len .Connections) 0}}
<tr><td colspan="6" style="padding:16px;text-align:center;color:var(--text-secondary)">Nenhuma conexão ativa.</td></tr>
{{end}}
{{end}}
